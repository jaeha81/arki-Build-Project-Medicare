name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-typecheck:
    name: Frontend TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medicare-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medicare-frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint

  backend-lint:
    name: Backend Ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medicare-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/

  agents-lint:
    name: Agents Ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medicare-agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/

  security-scan:
    name: Secret leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: |
          if grep -rn \
            "dev-secret-change-in-production\|dev-admin-token-placeholder" \
            --include="*.py" --include="*.ts" --include="*.tsx" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude="config.py" \
            --exclude="route.ts" \
            .; then
            echo "::error::Hardcoded placeholder secret detected in source code"
            exit 1
          fi
      - name: Scan for any type usage
        run: |
          COUNT=$(grep -rn ": any\b\|as any\b" \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir="node_modules" --exclude-dir=".next" \
            medicare-frontend/src/ | wc -l)
          echo "TypeScript 'any' usage count: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::Found $COUNT 'any' type usages"
          fi

  e2e:
    name: E2E (Playwright / chromium)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    defaults:
      run:
        working-directory: medicare-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medicare-frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: medicare-frontend/playwright-report/
          retention-days: 7
